<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 390" fill="none">
  <defs>
    <clipPath id="gc">
      <circle cx="150" cy="195" r="140"/>
    </clipPath>
    <linearGradient id="sg" x1="150" y1="55" x2="150" y2="335" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Globe grid lines, clipped to circle -->
  <g clip-path="url(#gc)" stroke="#fbbf24" fill="none">
    <!-- Meridians -->
    <line x1="150" y1="55" x2="150" y2="335"   stroke-width="0.75" opacity="0.14"/>
    <ellipse cx="150" cy="195" rx="70"  ry="140" stroke-width="0.75" opacity="0.11"/>
    <ellipse cx="150" cy="195" rx="120" ry="140" stroke-width="0.75" opacity="0.09"/>
    <!-- Parallels (ellipses give perspective curve) -->
    <ellipse cx="150" cy="135" rx="122" ry="20"  stroke-width="0.75" opacity="0.12"/>
    <ellipse cx="150" cy="195" rx="140" ry="24"  stroke-width="0.75" opacity="0.14"/>
    <ellipse cx="150" cy="255" rx="122" ry="20"  stroke-width="0.75" opacity="0.12"/>
  </g>

  <!-- Globe outer circle -->
  <circle cx="150" cy="195" r="140" stroke="url(#sg)" stroke-width="2.5"/>

  <!-- Three stars -->
  <text x="104" y="78"  text-anchor="middle" font-size="13" fill="#fbbf24" opacity="0.8">★</text>
  <text x="150" y="82"  text-anchor="middle" font-size="19" fill="#fbbf24">★</text>
  <text x="196" y="78"  text-anchor="middle" font-size="13" fill="#fbbf24" opacity="0.8">★</text>

  <!-- JOHNSIES -->
  <text
    x="150" y="132"
    text-anchor="middle"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="41"
    fill="white"
    letter-spacing="-1"
  >JOHNSIES</text>

  <!-- Divider: line · diamond · line -->
  <line x1="40"  y1="150" x2="126" y2="150" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  <polygon points="150,144 156,150 150,156 144,150" fill="#fbbf24"/>
  <line x1="174" y1="150" x2="260" y2="150" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>

  <!-- WORLD CUP -->
  <text
    x="150" y="185"
    text-anchor="middle"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="24"
    fill="#fbbf24"
    letter-spacing="5"
  >WORLD CUP</text>

  <!-- 2026 -->
  <text
    x="150" y="262"
    text-anchor="middle"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="62"
    fill="white"
    letter-spacing="-2"
  >2026</text>

  <!-- Accent dots: green · amber · green -->
  <circle cx="126" cy="302" r="3.5" fill="#4ade80" opacity="0.75"/>
  <circle cx="150" cy="302" r="3.5" fill="#fbbf24"/>
  <circle cx="174" cy="302" r="3.5" fill="#4ade80" opacity="0.75"/>
</svg>
